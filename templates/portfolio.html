<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='pokemon.ico') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./static/style.css">
    <style>
        .portfolio-wrapper {
            max-width: 1000px;
            margin: 120px auto 60px; /* push down from fixed nav */
            padding: 0 24px;
        }

        .portfolio-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .portfolio-header h2 {
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dim);
        }


        .pdf-frame-wrapper {
            border: 1px solid rgba(122, 162, 247, 0.2);
            border-radius: 8px;
            overflow: hidden;
            background: var(--bg-soft);
            box-shadow: 
            0 10px 40px rgba(0, 0, 0, 0.5),
            0 0 20px rgba(122, 162, 247, 0.1);
        }

        .pdf-frame-wrapper iframe {
            display: block;
            width: 100%;
            height: 85vh;
            border: none;
        }

        .portfolio-footer {
            margin-top: 12px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: #bbb;
            text-align: right;
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-content">
            <label class="logo">Site</label>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/AboutMe.html">AboutMe</a></li>
                <li><a href="/portfolio.html">Portfolio</a></li>
                <li><a href="/contactme.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="portfolio-wrapper">
        <div class="portfolio-header">
            <h2>Resume</h2>

        </div>
        <div class="pdf-frame-wrapper">
            <iframe 
  src="{{ url_for('static', filename='assets/profile.pdf') }}#toolbar=0"
  style="width:100%; height:85vh; border:none;">
</iframe>
    </div>
</body>

</html>
